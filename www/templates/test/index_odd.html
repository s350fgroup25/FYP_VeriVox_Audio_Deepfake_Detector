<!DOCTYPE html>
<html>
<head>
    <title>Audio Spoof DEMO</title>
    <style>
 	body {
    background: url('/static/images/audio-bg.jpg') no-repeat center center fixed;
    background-size: cover;
    color: white;
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    padding: 20px;
    font-size: 1.2rem;
}

h2 {
    text-align: center;
    font-size: 3rem;
    margin-bottom: 30px;
    text-shadow: 2px 2px 4px #000000cc;
}

.container {
    max-width: 600px;
    margin: 0 auto;
    background-color: rgba(0, 0, 0, 0.6); /* translucent black background */
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 0 15px #000000cc;
}

input[type="file"] {
    width: 100%;
    padding: 10px;
    font-size: 1rem;
    border-radius: 5px;
    border: none;
    cursor: pointer;
}

button {
    background-color: #1DB954;
    border: none;
    color: white;
    padding: 15px 30px;
    margin: 10px 0;
    font-size: 1.25rem;
    border-radius: 25px;
    cursor: pointer;
    transition: background-color 0.3s ease;
    width: 100%;
}

button:hover {
    background-color: #17a144;
}

#cancelBtn, #confirmBtn {
    background-color: #555555;
    margin-top: 10px;
    font-size: 1.1rem;
    width: 48%;
    display: inline-block;
    vertical-align: middle;
}

#cancelBtn:hover, #confirmBtn:hover {
    background-color: #333333;
}

#progressBox {
    margin-top: 10px;
    width: 100%;
}

progress {
    width: 100%;
    height: 20px;
    border-radius: 10px;
    -webkit-appearance: none;
    appearance: none;
}

progress::-webkit-progress-bar {
    background-color: #444;
    border-radius: 10px;
}

progress::-webkit-progress-value {
    background-color: #1DB954;
    border-radius: 10px;
}

#uploadMsg, #result {
    font-weight: bold;
    font-size: 1.4rem;
    margin-top: 10px;
    text-align: center;
    text-shadow: 1px 1px 3px #000;
}

#result.green {
    color: #2ecc71; /* green */
}

#result.red {
    color: #e74c3c; /* red */
}

@media (max-width: 600px) {
    body {
        font-size: 1rem;
        padding: 15px;
    }
    h2 {
        font-size: 2.2rem;
    }
    button {
        font-size: 1rem;
        padding: 12px 20px;
    }
    #cancelBtn, #confirmBtn {
        width: 100%;
        margin-bottom: 10px;
    }
}
       
    </style>
</head>
<body>
    <h2>ASVSpoof Demo</h2>
    <input type="file" id="fileInput">
    <button id="uploadBtn">Upload</button>
    <span id="uploadMsg"></span>
    <button id="cancelBtn">Cancel</button><br>
    <button id="submitBtn">Submit</button>
    <div id="progressBox" style="display:none;">
        <progress id="progressBar" value="0" max="100"></progress>
        <button id="confirmBtn" style="display:none;">Confirm</button>
    </div>
    <div id="result"></div>
    <button id="resetBtn">Reset</button>
    <script src="/static/actions.js"></script>
</body>
</html>
