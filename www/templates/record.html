<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>ASVspoof Recorder</title>
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 0 16px;
            text-align: center;
            /* ✅ 背景圖片 */
            background-image: url('/static/images/audio-bg.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            position: relative;
            min-height: 100vh;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        
        /* ✅ 半透明覆蓋層，讓文字清晰 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: -1;
        }
        
        /* ✅ 主要內容容器 */
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 30px;
            margin: 20px 0;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        
        h1 {
            margin-bottom: 0.2rem;
            font-size: 2.2em;
            background: linear-gradient(45deg, #fff, #f0f0f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        p {
            opacity: 0.9;
            margin-bottom: 25px;
            font-size: 1.1em;
        }
        
        #status {
            margin: 15px 0;
            padding: 15px;
            background: rgba(255,255,255,0.2);
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.1em;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
        }
        
        #controls {
            margin-top: 25px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }
        
        button {
            margin: 6px;
            padding: 14px 22px;
            font-size: 1rem;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            min-width: 140px;
        }
        
        #recordBtn {
            background: linear-gradient(45deg, #ff6b6b, #ee5a24);
            color: white;
        }
        #recordBtn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(255,107,107,0.4);
        }
        #recordBtn.recording {
            background: linear-gradient(45deg, #dc3545, #c82333) !important;
            animation: pulse 1s infinite;
        }
        
        #playBtn {
            background: linear-gradient(45deg, #6c757d, #495057);
            color: white;
        }
        #submitBtn {
            background: linear-gradient(45deg, #28a745, #20c997);
            color: white;
        }
        #downloadBtn {
            background: linear-gradient(45deg, #ff9800, #f57c00);
            color: white;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        #result {
            margin-top: 20px;
            font-size: 1.4rem;
            font-weight: bold;
            min-height: 40px;
            padding: 15px;
            background: rgba(255,255,255,0.15);
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }
        #result.green {
            color: #28a745;
            box-shadow: 0 0 20px rgba(40,167,69,0.3);
        }
        #result.red {
            color: #dc3545;
            box-shadow: 0 0 20px rgba(220,53,69,0.3);
        }
        
        #progressBar {
            width: 100%;
            height: 12px;
            margin-top: 15px;
            border-radius: 6px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            display: none;
        }
        
        #timeDisplay {
            margin-top: 12px;
            font-family: "SF Mono", Menlo, Consolas, monospace;
            font-size: 1.2rem;
            color: #f8f9fa;
            text-shadow: 0 1px 3px rgba(0,0,0,0.7);
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
        }
        
        audio {
            margin-top: 15px;
            width: 100%;
            max-width: 400px;
            border-radius: 12px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }
        
        @media (max-width: 600px) {
            body { margin: 10px; padding: 10px; }
            .container { margin: 10px; padding: 20px; }
            #controls { flex-direction: column; }
            button { width: 100%; margin: 6px 0; }
        }
    </style>
</head>
<body>
    <!-- ✅ HOME BUTTON -->
    <a href="/" class="back-link" style="position: fixed; top: 20px; left: 20px; color: #1DB954; text-decoration: none; font-size: 1.1rem; padding: 10px 20px; background: rgba(0,0,0,0.5); border-radius: 20px;">🏠 Home</a>
    <!-- ✅ 背景容器 -->
    <div class="container">
        <h1>🎙️ ASVspoof Recorder</h1>
        <p>Record up to 5 seconds, listen, then submit for analysis.</p>

        <div id="status">Ready to record your voice!</div>

        <div id="controls">
            <button id="recordBtn">🎤 Start (max 5s)</button>
            <button id="playBtn" disabled>▶ Play</button>
            <button id="submitBtn" disabled>📤 Submit & Analyze</button>
            <button id="downloadBtn" style="display:none;">💾 Download (test)</button>
        </div>

        <audio id="audioPlayer" controls></audio>

        <progress id="progressBar" value="0" max="100" style="display:none;"></progress>
        <div id="timeDisplay">00:00.0</div>

        <div id="result"></div>
    </div>
    <script src="/static/ai-result.js"></script>
    <script src="/static/record_actions.js"></script>
</body>
</html>
