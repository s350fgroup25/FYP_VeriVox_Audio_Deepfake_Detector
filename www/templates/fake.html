<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fake Audio Generator</title>
    <style>
        body {
            background: url('/static/images/audio-bg.jpg') no-repeat center center fixed;
            background-size: cover; color: white;
            font-family: "Segoe UI", sans-serif; margin: 0; padding: 20px;
        }
        .container {
            max-width: 700px; margin: 0 auto;
            background: rgba(0,0,0,0.85); padding: 40px;
            border-radius: 25px; text-align: center;
        }
        h1 { font-size: 2.4rem; margin-bottom: 20px; text-shadow: 2px 2px 4px #000; }
        textarea {
            width: 100%; height: 150px; resize: vertical;
            border-radius: 10px; border: none; padding: 10px;
            font-size: 1rem; font-family: inherit;
        }
        button {
            padding: 10px 20px; margin: 5px;
            border: none; border-radius: 8px; cursor: pointer;
            font-size: 1rem;
        }
        .primary { background: #1DB954; color: white; }
        .secondary { background: #007bff; color: white; }
        .danger { background: #dc3545; color: white; }
        audio { width: 100%; margin-top: 10px; }
        .line { margin: 20px 0; padding: 15px; border-radius: 10px; border: 2px dashed #666; }
        .line:hover { border-color: #1DB954; }
        #status, #submitStatus { font-style: italic; margin-top: 10px; }
        #result { font-size: 1.6rem; font-weight: bold; margin-top: 10px; }
        .green { color: #28a745; }
        .red { color: #dc3545; }
        .back-link {
            position: fixed; top: 20px; left: 20px;
            color: #1DB954; text-decoration: none;
            font-size: 1.1rem; padding: 10px 20px;
            background: rgba(0,0,0,0.5); border-radius: 20px;
        }
        #charCount {
            text-align: right; font-size: 0.9rem; opacity: 0.8;
        }
    </style>
</head>
<body>
    <a href="/" class="back-link">🏠 Home</a>

    <div class="container">
        <h1>🧪 Fake Audio Generator</h1>
        <p>Enter text (max 1000 characters) → generate fake speech (16kHz WAV) → download or send to ASVspoof model.</p>

        <!-- Line 1: Text area -->
        <div class="line">
            <label for="textInput">📝 Input text for TTS:</label><br>
            <textarea id="textInput" maxlength="1000" placeholder="Type text here (English or Chinese)..."></textarea>
            <div id="charCount">0 / 1000</div>
            <button class="primary" id="generateBtn">🔄 Generate Fake Audio</button>
            <div id="status"></div>
        </div>

        <!-- Line 2: Play audio -->
        <div class="line" id="line2" style="display:none;">
            <label>🎧 Generated fake audio (WAV 16kHz):</label>
            <audio id="audioPlayer" controls></audio>
        </div>

        <!-- Line 3: Download -->
        <div class="line" id="line3" style="display:none;">
            <button class="secondary" id="downloadBtn">💾 Download WAV</button>
        </div>

        <!-- Line 4: Submit -->
        <div class="line" id="line4" style="display:none;">
            <button class="primary" id="submitBtn">📤 Submit to Detector</button>
            <div id="submitStatus"></div>
            <div id="result"></div>
            <div id="confidence"></div>
        </div>
    </div>

    <script src="/static/fake.js"></script>
</body>
</html>
